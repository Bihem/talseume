<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#0a0a0a"/>
<title>Suivi de commande — TALSEUME</title>
<meta name="description" content="Suis l'état de ta commande Talseume en quelques secondes."/>
<style>
@font-face{font-family:'Suisse Intl';src:url('/fonts/SuisseIntl-Regular.woff2') format('woff2');font-weight:400;font-display:swap}
@font-face{font-family:'Suisse Intl';src:url('/fonts/SuisseIntl-Light.woff2') format('woff2');font-weight:300;font-display:swap}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--off:#faf9f6;--line-l:rgba(0,0,0,.08);--ok:#1d8055;--F:'Suisse Intl','Helvetica Neue',Helvetica,Arial,sans-serif}
html{background:#fff;scroll-behavior:smooth}
body{font-family:var(--F);-webkit-font-smoothing:antialiased;background:#fff;color:var(--black);min-height:100vh}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}

nav{position:fixed;top:0;left:0;right:0;z-index:500;background:#fff;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:80px;border-bottom:1px solid var(--line-l)}
.nav-logo{font-size:14px;font-weight:500;letter-spacing:.32em;text-transform:uppercase}
.nav-back{font-size:11px;letter-spacing:.22em;text-transform:uppercase;opacity:.6}
.nav-back:hover{opacity:1}

main{padding:130px 24px 80px;max-width:720px;margin:0 auto}
.eyebrow{font-size:11px;letter-spacing:.32em;text-transform:uppercase;opacity:.5;margin-bottom:14px}
h1{font-size:clamp(36px,6vw,64px);font-weight:300;letter-spacing:-.03em;line-height:1;margin-bottom:24px}
.lead{font-size:15px;font-weight:300;color:rgba(0,0,0,.7);line-height:1.7;margin-bottom:40px;max-width:520px}

.lookup{background:#faf9f6;border:1px solid var(--line-l);border-radius:12px;padding:28px}
.field{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.field label{font-size:10px;letter-spacing:.24em;text-transform:uppercase;opacity:.6}
.field input{font-family:inherit;font-size:14px;font-weight:300;border:1px solid var(--line-l);background:#fff;padding:14px 16px;border-radius:8px;outline:none}
.field input:focus{border-color:var(--black)}
.submit-btn{width:100%;background:var(--black);color:#fff;font-size:12px;font-weight:500;letter-spacing:.28em;text-transform:uppercase;padding:18px;border-radius:10px;transition:opacity .25s}
.submit-btn:hover{opacity:.88}
.submit-btn:disabled{opacity:.4;cursor:not-allowed}

.feedback{display:none;padding:18px;border-radius:10px;margin-top:18px;font-size:13px;line-height:1.6}
.feedback.show{display:block}
.feedback.error{background:#fff0ed;border:1px solid #ff5237;color:#b71c00}

.result{display:none;margin-top:40px}
.result.show{display:block;animation:fade .4s}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.order-head{padding:24px 0;border-bottom:1px solid var(--line-l);margin-bottom:32px}
.order-head h2{font-size:24px;font-weight:300;letter-spacing:-.02em;margin-bottom:6px}
.order-head .meta{font-size:13px;color:rgba(0,0,0,.6)}

.timeline{position:relative;padding:8px 0 24px;margin-bottom:32px}
.step{display:flex;gap:18px;padding:18px 0;align-items:flex-start;position:relative}
.step::before{content:'';position:absolute;left:11px;top:36px;bottom:-18px;width:1px;background:var(--line-l)}
.step:last-child::before{display:none}
.dot{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line-l);background:#fff;flex-shrink:0;position:relative;z-index:1;display:flex;align-items:center;justify-content:center}
.step.done .dot{background:var(--black);border-color:var(--black)}
.step.done .dot::after{content:'';width:7px;height:4px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translate(1px,-1px)}
.step-body{flex:1;padding-top:1px}
.step-body .label{font-size:14px;font-weight:500;margin-bottom:4px}
.step.done .label{color:var(--black)}
.step:not(.done) .label{color:rgba(0,0,0,.4)}
.step-body .ts{font-size:12px;color:rgba(0,0,0,.55)}
.step-body .tracking{font-size:12px;color:var(--black);margin-top:6px}
.step-body .tracking a{border-bottom:1px solid currentColor}

.items{background:#faf9f6;border:1px solid var(--line-l);border-radius:10px;padding:20px;margin-bottom:24px}
.items h3{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(0,0,0,.55);margin-bottom:14px}
.items .row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px}
.items .total{padding-top:12px;margin-top:8px;border-top:1px solid var(--line-l);font-weight:500;font-size:14px}

.actions{display:flex;gap:12px;flex-wrap:wrap}
.actions a{padding:14px 24px;border:1px solid var(--black);font-size:11px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;border-radius:99px;transition:.2s}
.actions a:hover{background:var(--black);color:#fff}

footer{padding:40px 24px;text-align:center;font-size:11px;color:rgba(0,0,0,.5);border-top:1px solid var(--line-l);margin-top:80px}
</style>
<script src="/tracking.js" defer></script>
</head>
<body>

<nav>
  <a href="/" class="nav-back">← Accueil</a>
  <a href="/" class="nav-logo">TALSEUME</a>
  <a href="/contact.html" class="nav-back">Aide</a>
</nav>

<main>
  <div class="eyebrow">Service client</div>
  <h1>Suivi de commande</h1>
  <p class="lead">Renseigne ton numéro de commande et l'email utilisé pour voir l'état actuel.</p>

  <form id="lookup" class="lookup" novalidate>
    <div class="field">
      <label for="orderId">Numéro de commande (cs_…)</label>
      <input id="orderId" required placeholder="cs_live_abc123…"/>
    </div>
    <div class="field">
      <label for="email">Email utilisé</label>
      <input id="email" type="email" required placeholder="toi@exemple.fr"/>
    </div>
    <button type="submit" class="submit-btn" id="submit">Voir ma commande</button>
    <div class="feedback" id="feedback"></div>
  </form>

  <section class="result" id="result"></section>
</main>

<footer>© Talseume · <a href="/" style="border-bottom:1px solid currentColor">talseume.com</a></footer>

<script>
const fmtEur = n => (Math.round((n||0)*100)/100).toFixed(2).replace('.',',') + ' €';
const fmtDate = ts => ts ? new Date(ts).toLocaleDateString('fr-FR', { day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';

const q = new URLSearchParams(location.search);
if (q.get('cmd')) document.getElementById('orderId').value = q.get('cmd');
if (q.get('email')) document.getElementById('email').value = q.get('email');

document.getElementById('lookup').addEventListener('submit', async e => {
  e.preventDefault();
  const orderId = document.getElementById('orderId').value.trim();
  const email = document.getElementById('email').value.trim();
  const fb = document.getElementById('feedback');
  const btn = document.getElementById('submit');
  const result = document.getElementById('result');
  fb.className = 'feedback';
  result.className = 'result';
  result.innerHTML = '';
  btn.disabled = true; btn.textContent = 'Recherche…';

  try {
    const res = await fetch(`/.netlify/functions/order-tracking?orderId=${encodeURIComponent(orderId)}&email=${encodeURIComponent(email)}`);
    const data = await res.json();
    if (!res.ok) {
      const msg = { order_not_found: 'Commande introuvable.', email_mismatch: 'L\'email ne correspond pas.' }[data.error] || 'Erreur · réessaye.';
      fb.className = 'feedback show error'; fb.textContent = msg;
      return;
    }
    render(data);
  } catch {
    fb.className = 'feedback show error'; fb.textContent = 'Erreur réseau.';
  } finally {
    btn.disabled = false; btn.textContent = 'Voir ma commande';
  }
});

function render(d) {
  const result = document.getElementById('result');
  const steps = (d.timeline || []).map(s => `
    <div class="step ${s.done ? 'done' : ''}">
      <div class="dot"></div>
      <div class="step-body">
        <div class="label">${s.label}</div>
        ${s.ts ? `<div class="ts">${fmtDate(s.ts)}</div>` : ''}
        ${s.tracking ? `<div class="tracking">Suivi <strong>${s.carrier || ''}</strong> · <code>${s.tracking}</code></div>` : ''}
      </div>
    </div>
  `).join('');

  const items = (d.items || []).map(i => `<div class="row"><span>${i.title} <span style="opacity:.5">×${i.qty}</span></span><span>${fmtEur(i.price * i.qty)}</span></div>`).join('');

  result.innerHTML = `
    <div class="order-head">
      <h2>Commande #${d.orderNum}</h2>
      <div class="meta">Bonjour ${d.customer.name?.split(' ')[0] || ''} — voici l'état de ta commande.</div>
    </div>

    <div class="timeline">${steps}</div>

    <div class="items">
      <h3>Détail</h3>
      ${items}
      <div class="row total"><span>Total</span><span>${fmtEur(d.amount)}</span></div>
    </div>

    <div class="actions">
      <a href="/retour?cmd=${d.return ? d.return.orderId : encodeURIComponent(d.return?.orderId || '')}${!d.return ? '' : ''}">Faire un retour</a>
      <a href="/contact.html">Contact</a>
    </div>
  `;
  // Fix l'URL retour (passe l'orderId réel)
  const orderId = document.getElementById('orderId').value.trim();
  result.querySelector('.actions a').setAttribute('href', `/retour?cmd=${encodeURIComponent(orderId)}`);
  result.className = 'result show';
  result.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Auto-load si ?cmd & ?email
if (q.get('cmd') && q.get('email')) document.getElementById('lookup').dispatchEvent(new Event('submit'));
</script>

</body>
</html>

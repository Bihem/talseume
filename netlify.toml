[build]
  publish = "."
  functions = "netlify/functions"

# ── Routes propres ────────────────────────────────────────────────
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap-xml"
  status = 200

[[redirects]]
  from = "/retour"
  to = "/retour.html"
  status = 200

[[redirects]]
  from = "/avis"
  to = "/avis.html"
  status = 200

[[redirects]]
  from = "/suivi"
  to = "/suivi-commande.html"
  status = 200

[[redirects]]
  from = "/collection/*"
  to = "/collection.html?slug=:splat"
  status = 200

# ── Sécurité globale ──────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# ── HTML : revérification rapide pour suivre les déploiements ─────
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=86400"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=300, stale-while-revalidate=86400"

# ── Assets : cache un an immutable ────────────────────────────────
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── /data/*.json : éditables via admin, revalidation systématique ─
[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
